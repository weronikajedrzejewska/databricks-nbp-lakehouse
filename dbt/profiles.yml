nbp_dbt:
  target: dev
  outputs:
    dev:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: "{{ env_var('DATABRICKS_CATALOG', 'fx_lakehouse') }}"
      schema: "{{ env_var('DATABRICKS_SCHEMA', 'nbp') }}"
      threads: 4

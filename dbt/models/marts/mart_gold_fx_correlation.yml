version: 2

models:
  - name: mart_gold_fx_correlation
    description: Gold correlation snapshot for FX currency pairs.
    columns:
      - name: as_of_date
        tests:
          - not_null
      - name: currency_a
        tests:
          - not_null
      - name: currency_b
        tests:
          - not_null
      - name: obs_cnt
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - as_of_date
              - currency_a
              - currency_b
